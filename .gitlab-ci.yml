variables:
  GIT_SSL_NO_VERIFY: "true"
  GIT_STRATEGY: clone  

stages:
  - build
  - deploy
  - test
  - destroy

build-job:
  stage: build
  image: docker
  services: 
    - docker:dind
  tags:
    - dualedu-docker
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
    - docker build -t dmajoros/repa:latest -f Dockerfile .
    - docker image ls
    - docker push dmajoros/repa:latest
    - docker logout
  when: manual

metallb-deploy-job:
  stage: deploy
  image:
    name: bitnami/kubectl:latest
    entrypoint: ['']
  tags:
    - david
  before_script:
    - echo "$SERVICE_ACCOUNT_KEY" > k3s.yaml
    - export KUBECONFIG=k3s.yaml
  script:
    - kubectl get pods --all-namespaces
    - kubectl apply -f https://raw.githubusercontent.com/metallb/metallb/v0.13.9/config/manifests/metallb-native.yaml
    - kubectl apply -f metallb/pool-1.yaml -n metallb-system
    - kubectl apply -f metallb/l2advertisement.yaml -n metallb-system
  when: manual

app-deploy-job:
  stage: deploy
  image:
    name: bitnami/kubectl:latest
    entrypoint: ['']
  tags:
    - david
  before_script:
    - echo "$SERVICE_ACCOUNT_KEY" > k3s.yaml
    - export KUBECONFIG=k3s.yaml
  script:
    - kubectl get pods --all-namespaces
    - kubectl get node -o wide
    - kubectl apply -f repa-prod/namespace.yaml
    - kubectl apply -f repa-prod/deployment.yaml
    - kubectl apply -f repa-prod/service.yaml
  when: manual

test-job:
  stage: test
  image:
    name: bitnami/kubectl:latest
    entrypoint: ['']
  tags:
    - david
  before_script:
    - echo "$SERVICE_ACCOUNT_KEY" > k3s.yaml
    - export KUBECONFIG=k3s.yaml
  script:
    - kubectl get node -o wide
    - kubectl get namespace 
    - kubectl get pod -n prod -o wide
    - kubectl get service -n prod -o wide
  when: manual

destroy-job:
  stage: destroy
  image:
    name: bitnami/kubectl:latest
    entrypoint: ['']
  tags:
    - david
  before_script:
    - echo "$SERVICE_ACCOUNT_KEY" > k3s.yaml
    - export KUBECONFIG=k3s.yaml
  script:
    - kubectl delete -f https://raw.githubusercontent.com/metallb/metallb/v0.13.9/config/manifests/metallb-native.yaml
    - kubectl delete deployment repa-app -n prod
    - kubectl delete service repa-app -n prod
    - kubectl delete namespace prod
    - kubectl get namespace 
  when: manual


